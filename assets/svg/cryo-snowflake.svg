<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40">
  <!-- 6-arm snowflake: 3 lines through center at 60° apart -->
  <g stroke="#003B5C" stroke-width="2" stroke-linecap="round">
    <!-- Horizontal arm (0° / 180°) -->
    <line x1="4" y1="20" x2="36" y2="20"/>
    <!-- 60° / 240° arm (upper-right to lower-left) -->
    <line x1="28" y1="6" x2="12" y2="34"/>
    <!-- 120° / 300° arm (upper-left to lower-right) -->
    <line x1="12" y1="6" x2="28" y2="34"/>
  </g>
  <!-- V-shaped branches at each arm tip, angled back at 60° -->
  <g stroke="#003B5C" stroke-width="1.5" stroke-linecap="round" fill="none">
    <!-- 0° arm (right), base at (31,20) -->
    <line x1="31" y1="20" x2="28.5" y2="15.7"/>
    <line x1="31" y1="20" x2="28.5" y2="24.3"/>
    <!-- 60° arm (down-right), base at (25.5,29.5) -->
    <line x1="25.5" y1="29.5" x2="20.5" y2="29.5"/>
    <line x1="25.5" y1="29.5" x2="28" y2="25.2"/>
    <!-- 120° arm (down-left), base at (14.5,29.5) -->
    <line x1="14.5" y1="29.5" x2="12" y2="25.2"/>
    <line x1="14.5" y1="29.5" x2="19.5" y2="29.5"/>
    <!-- 180° arm (left), base at (9,20) -->
    <line x1="9" y1="20" x2="11.5" y2="15.7"/>
    <line x1="9" y1="20" x2="11.5" y2="24.3"/>
    <!-- 240° arm (up-left), base at (14.5,10.5) -->
    <line x1="14.5" y1="10.5" x2="19.5" y2="10.5"/>
    <line x1="14.5" y1="10.5" x2="12" y2="14.8"/>
    <!-- 300° arm (up-right), base at (25.5,10.5) -->
    <line x1="25.5" y1="10.5" x2="28" y2="14.8"/>
    <line x1="25.5" y1="10.5" x2="20.5" y2="10.5"/>
  </g>
</svg>
