<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40">
  <!-- Probe tip: inverted triangle (flat top, point at bottom) -->
  <path fill="#003B5C" d="M13 4 L27 4 L20 17 Z"/>
  <!-- Tunneling gap (dashed line) -->
  <line x1="20" y1="18" x2="20" y2="25" stroke="#003B5C" stroke-width="1.5" stroke-dasharray="2,2"/>
  <!-- Atom on surface (small circle) -->
  <circle fill="#003B5C" cx="20" cy="28" r="2.5"/>
  <!-- Surface line -->
  <rect fill="#003B5C" x="5" y="32" width="30" height="2.5" rx="1"/>
</svg>
